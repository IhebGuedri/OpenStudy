<div class="auth-page">
  <mat-card class="auth-card">
    <div class="auth-logo">
      <mat-icon class="logo-icon">school</mat-icon>
      <h1 class="logo-text">OpenStudy</h1>
    </div>
    <p class="auth-subtitle">Sign in to your account</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email address</mat-label>
        <input matInput type="email" formControlName="email"
               placeholder="you@example.com" autocomplete="email" />
        <mat-icon matSuffix>email</mat-icon>
        <mat-error *ngIf="email?.errors?.['required']">Email is required.</mat-error>
        <mat-error *ngIf="email?.errors?.['email']">Enter a valid email.</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password"
               placeholder="••••••" autocomplete="current-password" />
        <mat-icon matSuffix>lock</mat-icon>
        <mat-error *ngIf="password?.errors?.['required']">Password is required.</mat-error>
        <mat-error *ngIf="password?.errors?.['minlength']">Minimum 6 characters.</mat-error>
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit"
              class="full-width submit-btn"
              [disabled]="form.invalid || authService.isLoading">
        <mat-spinner *ngIf="authService.isLoading" diameter="22"></mat-spinner>
        <span *ngIf="!authService.isLoading">Sign In</span>
      </button>

      <p *ngIf="loginError" class="auth-error">Invalid email or password.</p>
    </form>

    <p class="auth-footer">Don't have an account?
      <a routerLink="/register">Register</a>
    </p>
  </mat-card>
</div>
