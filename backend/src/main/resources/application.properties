spring.application.name=openStudy

# PostgreSQL database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Bootstrap admin account (change these values in production)
app.admin.enabled=${APP_ADMIN_ENABLED:true}
app.admin.name=${APP_ADMIN_NAME:System Admin}
app.admin.email=${APP_ADMIN_EMAIL:admin@openstudy.local}
app.admin.password=${APP_ADMIN_PASSWORD:changeme}

# JWT secret - MUST be set via environment variable in production
jwt.secret=${JWT_SECRET:default-dev-secret-change-in-production}